# .github/workflows/sync-skills.yaml
# Renovate only bumps the SHA in skills.txt, so on Renovate branches the
# vendor job re-installs the vendored files (.claude/skills/) and pushes the
# diff back to the PR. On all other PRs the verify job only checks that the
# manifest and the vendored files are in sync.
#
# Note: the vendor commit is pushed with GITHUB_TOKEN, which does NOT trigger
# new workflow runs on that commit (GitHub limitation). If branch protection
# requires status checks, use a PAT / GitHub App token instead.
name: sync-skills
on:
  pull_request:
    paths:
      - "skills.txt"
      - "install.sh"
      - ".claude/skills/**"

jobs:
  vendor:
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Vendor skills per skills.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./install.sh
          git add .claude/skills
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: vendor skills per skills.txt"
            git push
          fi

  verify:
    if: ${{ !startsWith(github.head_ref, 'renovate/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify skills match manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./install.sh --check
